<script>
(function() {
  const TABS = ['alloc', 'screener', 'research'];
  function showPane(which) {
    TABS.forEach(t => {
      document.getElementById('tao-pane-' + t).style.display = (t === which) ? 'block' : 'none';
      const btn = document.getElementById('tao-tab-' + t);
      if (t === which) {
        btn.style.background = '#1C1F24'; btn.style.color = '#EDEAE3'; btn.style.borderColor = '#C8893B';
      } else {
        btn.style.background = 'transparent'; btn.style.color = '#8C8A84'; btn.style.borderColor = '#2A2D33';
      }
    });
    if (which === 'research' && typeof window.taoCheckResearchPending === 'function') {
      window.taoCheckResearchPending();
    }
  }
  TABS.forEach(t => {
    document.getElementById('tao-tab-' + t).onclick = () => showPane(t);
  });
  // Exposed so other isolated pane scripts (e.g. the Screener's research-icon
  // click) can reuse this exact tab-switch mechanism instead of introducing
  // a second navigation pattern.
  window.taoShowPane = showPane;
})();
</script>

<script>
(function() {
  const root = document.getElementById('tao-root');

  const DEFAULT_WATCHLIST = [
    { netuid: 64, label: 'Chutes', tag: 'verified-rev' },
    { netuid: 4,  label: 'Targon', tag: 'self-reported' },
    { netuid: 51, label: 'lium.io', tag: 'self-reported' },
    { netuid: 8,  label: 'Vanta', tag: 'self-reported' },
  ];

  // Static, manually-curated revenue reference. Not live — this is qualitative
  // diligence that taostats does not track, sourced from SubnetRadar and public
  // reporting. Refresh by hand periodically; "checked" shows when it was last verified.
  const REVENUE_REFERENCE = {
    64:  { rev90d: 1440000, window: '90d', verified: 'TI Verified',   checked: '2026-06-20', note: 'Settlement-grade on-chain ledger' },
    4:   { rev90d: 100000,  window: '90d', verified: 'Self-reported', checked: '2026-06-20', note: 'April 2026 revenue' },
    51:  { rev90d: 530000,  window: '90d', verified: 'Self-reported', checked: '2026-06-20', note: 'Jan\u2013Apr 2026' },
    8:   { rev90d: 100000,  window: '90d', verified: 'Self-reported', checked: '2026-06-20', note: 'MRR, March 2026' },
    93:  { rev90d: 160000,  window: '90d', verified: 'TI Verified',   checked: '2026-06-20', note: 'Total revenue, April 2026' },
    121: { rev90d: 32000,   window: '90d', verified: 'TI Verified',   checked: '2026-06-20', note: 'Commercial contract, March 2026' },
    22:  { rev90d: 11000,   window: '90d', verified: 'Self-reported', checked: '2026-06-20', note: 'MRR, October 2025' },
  };

  // ---- Revenue overrides (localStorage) ----
  // The hardcoded table above is a one-time manual pull and will never
  // update itself — there's no API for "external revenue," it's a business
  // fact someone has to read and type in. Rather than requiring a code edit
  // every time, edits are stored here and layered on top of the static
  // defaults at read time. A subnet with no entry in either source simply
  // has no revenue data, same as before.
  const REVENUE_OVERRIDE_KEY = 'tao_dashboard_revenue_overrides_v1';

  function loadRevenueOverrides() {
    try {
      const raw = localStorage.getItem(REVENUE_OVERRIDE_KEY);
      return raw ? JSON.parse(raw) : {};
    } catch (e) {
      return {};
    }
  }

  function saveRevenueOverride(netuid, entry) {
    try {
      const all = loadRevenueOverrides();
      all[netuid] = entry;
      localStorage.setItem(REVENUE_OVERRIDE_KEY, JSON.stringify(all));
      return true;
    } catch (e) {
      return false;
    }
  }

  function getRevenueEntry(netuid) {
    const overrides = loadRevenueOverrides();
    if (overrides[netuid]) return { ...overrides[netuid], isOverride: true };
    if (REVENUE_REFERENCE[netuid]) return { ...REVENUE_REFERENCE[netuid], isOverride: false };
    return null;
  }

  // Persistence: watchlist and wallet address survive closing/reopening this
  // file via localStorage, scoped to this browser. The API key is
  // deliberately NEVER persisted — it stays session-only in memory, same
  // as always, so closing the tab still clears it.
  const STORAGE_KEY = 'tao_dashboard_v1';

  function loadPersisted() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      if (!parsed || typeof parsed !== 'object') return null;
      return parsed;
    } catch (e) {
      // Corrupted data, private-browsing restrictions, or localStorage
      // unavailable entirely — fall back to defaults rather than break.
      return null;
    }
  }

  function savePersisted() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        watchlist: state.watchlist,
        walletAddress: state.walletAddress || '',
      }));
    } catch (e) {
      // Storage full, disabled, or unavailable — fail silently, nothing
      // breaks, it just won't persist this time.
    }
  }

  const persisted = loadPersisted();

  let state = {
    apiKey: '',
    watchlist: (persisted && Array.isArray(persisted.watchlist) && persisted.watchlist.length > 0)
      ? persisted.watchlist
      : JSON.parse(JSON.stringify(DEFAULT_WATCHLIST)),
    taoPrice: null,
    taoChange24h: null,
    marketCap: null,
    volume24h: null,
    subnetData: {},   // netuid -> { price, marketCapUsd, change24h, name }
    lastUpdated: null,
    loading: false,
    error: null,
    rawDebug: {},
    showDebug: false,
    addRowOpen: false,
    addRowError: null,
    rowSyncing: null, // netuid currently being individually fetched, or null
    revEditNetuid: null, // netuid whose revenue edit form is currently open, or null
    walletAddress: (persisted && persisted.walletAddress) || '',
    walletHoldings: null,
    walletFreeTao: null,
    walletLoading: false,
    walletError: null,
  };

  function firstNum() {
    for (let i = 0; i < arguments.length; i++) {
      const v = arguments[i];
      if (v !== undefined && v !== null && v !== '' && !isNaN(parseFloat(v))) return parseFloat(v);
    }
    return null;
  }

  function fmtUsd(n, decimals) {
    if (n === null || n === undefined || isNaN(n)) return '—';
    if (decimals === undefined) decimals = n < 1000 ? 2 : 0;
    return '$' + Number(n).toLocaleString(undefined, { maximumFractionDigits: decimals, minimumFractionDigits: decimals === 2 ? 2 : 0 });
  }
  function fmtCompactUsd(n) {
    if (n === null || n === undefined || isNaN(n)) return '—';
    const abs = Math.abs(n);
    if (abs >= 1e9) return '$' + (n/1e9).toFixed(2) + 'B';
    if (abs >= 1e6) return '$' + (n/1e6).toFixed(2) + 'M';
    if (abs >= 1e3) return '$' + (n/1e3).toFixed(1) + 'K';
    return '$' + n.toFixed(2);
  }
  function fmtPct(n) {
    if (n === null || n === undefined || isNaN(n)) return '—';
    const sign = n > 0 ? '+' : '';
    return sign + n.toFixed(2) + '%';
  }
  function sparklineSvg(prices, isUp) {
    if (!prices || prices.length < 2) return '<span style="color:var(--text-faint); font-size:11px;">no data</span>';
    const w = 64, h = 24, pad = 2;
    const min = Math.min.apply(null, prices);
    const max = Math.max.apply(null, prices);
    const range = (max - min) || 1;
    const stroke = isUp ? 'var(--teal)' : (isUp === false ? 'var(--red)' : 'var(--text-dim)');
    const pts = prices.map((p, i) => {
      const x = pad + (i / (prices.length - 1)) * (w - pad * 2);
      const y = pad + (1 - (p - min) / range) * (h - pad * 2);
      return x.toFixed(1) + ',' + y.toFixed(1);
    }).join(' ');
    return '<svg width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '" style="display:block;">' +
      '<polyline points="' + pts + '" fill="none" stroke="' + stroke + '" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round" />' +
      '</svg>';
  }
  function timeAgo(ts) {
    if (!ts) return 'never';
    const s = Math.floor((Date.now() - ts) / 1000);
    if (s < 5) return 'just now';
    if (s < 60) return s + 's ago';
    const m = Math.floor(s / 60);
    if (m < 60) return m + 'm ago';
    const h = Math.floor(m / 60);
    return h + 'h ago';
  }

  async function fetchTaoStats(path) {
    const res = await fetch('https://api.taostats.io' + path, {
      headers: { 'Authorization': state.apiKey, 'accept': 'application/json' }
    });
    if (!res.ok) {
      let bodyText = '';
      try { bodyText = await res.text(); } catch (e) { /* ignore */ }
      const err = new Error('Request failed (' + res.status + ')' + (bodyText ? ': ' + bodyText.slice(0, 300) : ''));
      err.status = res.status;
      err.body = bodyText;
      throw err;
    }
    return res.json();
  }

  async function lookupWallet() {
    if (!state.apiKey) {
      state.walletError = 'Add your taostats API key above first.';
      render();
      return;
    }
    const addr = (document.getElementById('tao-wallet-input') || {}).value || state.walletAddress;
    if (!addr || addr.trim().length < 10) {
      state.walletError = 'Enter a valid public coldkey address (SS58 format).';
      render();
      return;
    }
    state.walletAddress = addr.trim();
    savePersisted();
    state.walletLoading = true;
    state.walletError = null;
    render();

    try {
      // Confirmed endpoint shape from taostats docs: returns per-hotkey,
      // per-subnet stake balances for a coldkey. balance = alpha as RAO,
      // balance_as_tao = TAO-equivalent value as RAO. Field names here are
      // from docs, not tested live — falls back to a clear error if wrong
      // rather than showing fabricated numbers.
      const data = await fetchTaoStats('/api/dtao/stake_balance/latest/v1?coldkey=' + encodeURIComponent(state.walletAddress));
      const rows = (data && data.data) || [];
      if (!Array.isArray(rows) || rows.length === 0) {
        state.walletError = 'No holdings found for this address, or the lookup format needs adjusting — try "show raw response" below to check the API reply.';
        state.walletHoldings = [];
        state.rawDebug.wallet = data;
      } else {
        state.walletHoldings = rows.map(r => ({
          netuid: r.netuid,
          hotkeyName: r.hotkey_name || null, // this is the VALIDATOR's name (e.g. "Taostats"), not the subnet's — kept separately, never shown as the subnet name
          subnetName: null, // filled in below from the pool endpoint
          alphaBalance: r.balance !== undefined ? parseFloat(r.balance) / 1e9 : null,
          balanceAsTao: r.balance_as_tao !== undefined ? parseFloat(r.balance_as_tao) / 1e9 : null,
        }));
        state.rawDebug.wallet = { sample: rows.slice(0, 2), total_rows: rows.length };

        // Enrich with real subnet names. hotkey_name on the stake_balance
        // endpoint is the validator's name, not the subnet's — using it as
        // the subnet label was a real bug (every row showed the validator
        // you're staked through, e.g. "Taostats", instead of the subnet).
        // One call per unique held netuid; capped so a wallet with many
        // positions can't blow the free tier's rate limit in one lookup.
        const uniqueNetuids = [...new Set(state.walletHoldings.map(h => h.netuid))].slice(0, 10);
        const nameResults = await Promise.allSettled(
          uniqueNetuids.map(netuid => fetchTaoStats('/api/dtao/pool/latest/v1?netuid=' + netuid))
        );
        const nameByNetuid = {};
        nameResults.forEach((r, i) => {
          if (r.status === 'fulfilled') {
            const row = (r.value && r.value.data && r.value.data[0]) || null;
            if (row && row.name) nameByNetuid[uniqueNetuids[i]] = row.name;
          }
        });
        state.walletHoldings.forEach(h => {
          h.subnetName = nameByNetuid[h.netuid] || null;
        });
        if (uniqueNetuids.length < new Set(state.walletHoldings.map(h => h.netuid)).size) {
          state.rawDebug.walletNamesTruncated = true;
        }
      }
    } catch (e) {
      state.walletError = e.message || 'Could not look up this address.';
      state.rawDebug.wallet = {
        error: e.message,
        status: e.status || null,
        body: e.body || null,
        endpoint_tried: '/api/dtao/stake_balance/latest/v1?coldkey=' + state.walletAddress,
      };
    }

    // Separate, independent attempt at the free/account balance — confirmed
    // endpoint and field names directly from taostats' published OpenAPI
    // spec (docs.taostats.io/reference/get-account): balance_free, 
    // balance_staked, balance_total, all in RAO. Isolated in its own
    // try/catch so a transient failure here can't break the stake-balance
    // results we already know work. One retry on failure, since a 500 from
    // a third-party API is often transient rather than a real contract
    // mismatch — confirmed correct against the docs as of this check.
    async function attemptAccountFetch() {
      const acctData = await fetchTaoStats('/api/account/latest/v1?address=' + encodeURIComponent(state.walletAddress));
      const acctRow = (acctData && acctData.data && acctData.data[0]) || null;
      if (!acctRow) {
        return { ok: false, note: 'No account row returned', raw: acctData };
      }
      const freeTaoRao = firstNum(acctRow.balance_free);
      return {
        ok: true,
        freeTao: freeTaoRao !== null ? freeTaoRao / 1e9 : null,
        totalTaoRao: firstNum(acctRow.balance_total),
        sample: acctRow,
      };
    }

    try {
      let result;
      try {
        result = await attemptAccountFetch();
      } catch (firstErr) {
        // One retry — a 500 from taostats' side is often transient.
        await new Promise(r => setTimeout(r, 800));
        result = await attemptAccountFetch();
      }
      if (result.ok) {
        state.walletFreeTao = result.freeTao;
        state.rawDebug.walletAccount = { sample: result.sample };
      } else {
        state.walletFreeTao = null;
        state.rawDebug.walletAccount = { note: result.note, raw: result.raw };
      }
    } catch (e) {
      state.walletFreeTao = null;
      state.rawDebug.walletAccount = {
        error: e.message,
        status: e.status || null,
        body: e.body || null,
        endpoint_tried: '/api/account/latest/v1?address=' + state.walletAddress,
        note: 'Failed on both the initial attempt and one retry — likely a transient taostats server issue (confirmed 500-class error), not a wrong endpoint or parameter. Try syncing again in a moment.',
      };
    }
    state.walletLoading = false;
    render();
  }

  function applySettledPoolResult(netuid, r, taoPrice) {
    if (r.status === 'fulfilled') {
      const rows = (r.value && r.value.data) || [];
      if (rows.length === 0) {
        state.subnetData[netuid] = { error: true, reason: 'no_data', detail: 'API returned an empty result for netuid ' + netuid + ' — this subnet may not exist or has no active pool data.' };
        state.rawDebug['sn' + netuid] = r.value;
      } else {
        state.rawDebug['sn' + netuid] = r.value;
        const d = rows[0];
        const priceTao = firstNum(d.price);
        const marketCapTao = d.market_cap !== undefined ? firstNum(d.market_cap) / 1e9 : null;
        const liquidityTao = d.liquidity !== undefined ? firstNum(d.liquidity) / 1e9 : null;
        state.subnetData[netuid] = {
          priceTao: priceTao,
          priceUsd: (taoPrice && priceTao !== null) ? taoPrice * priceTao : null,
          marketCapUsd: (taoPrice && marketCapTao !== null) ? taoPrice * marketCapTao : null,
          liquidityUsd: (taoPrice && liquidityTao !== null) ? taoPrice * liquidityTao : null,
          change24h: firstNum(d.price_change_1_day),
          change1w: firstNum(d.price_change_1_week),
          sparkline: Array.isArray(d.seven_day_prices) ? d.seven_day_prices.map(pt => parseFloat(pt.price)) : [],
        };
      }
    } else {
      state.subnetData[netuid] = { error: true, reason: 'fetch_failed', detail: (r.reason && r.reason.message) || 'Unknown error' };
      state.rawDebug['sn' + netuid] = { fetch_error: (r.reason && r.reason.message) || String(r.reason), status: (r.reason && r.reason.status) || null };
    }
  }

  async function fetchSingleSubnet(netuid) {
    // Used both when adding a subnet, and via the per-row sync button —
    // fetches only this one subnet's pool data (1 API call) instead of
    // re-fetching the whole watchlist. Matters on the free tier's
    // 5-calls/minute limit, especially with long watchlists where a full
    // sync would fire every row at once and let the rate limit decide
    // arbitrarily which ones land.
    if (!state.apiKey) {
      state.error = 'Add your taostats API key above first.';
      render();
      return;
    }
    state.rowSyncing = netuid;
    render();
    try {
      const settled = await Promise.allSettled([fetchTaoStats('/api/dtao/pool/latest/v1?netuid=' + netuid)]);
      applySettledPoolResult(netuid, settled[0], state.taoPrice);
    } catch (e) {
      state.subnetData[netuid] = { error: true, reason: 'fetch_failed', detail: e.message || 'Unknown error' };
    }
    state.rowSyncing = null;
    state.lastUpdated = Date.now();
    render();
  }

  async function refreshData() {
    if (!state.apiKey) {
      state.error = 'Add your taostats API key above to load live data.';
      render();
      return;
    }
    state.loading = true;
    state.error = null;
    render();

    try {
      // TAO price — field names confirmed less rigorously than the pool endpoint,
      // so fall back across a few plausible variants rather than silently showing nothing.
      const priceData = await fetchTaoStats('/api/price/latest/v1?asset=tao');
      state.rawDebug.price = priceData;
      const p = (priceData && priceData.data && priceData.data[0]) || {};
      state.taoPrice = firstNum(p.price, p.price_usd, p.usd);
      state.taoChange24h = firstNum(p.percent_change_24h, p.price_change_1_day, p.change_24h);
      state.marketCap = firstNum(p.market_cap, p.market_cap_usd);
      state.volume24h = firstNum(p.volume_24h, p.tao_volume_24_hr, p.volume_24_hr);
      // market_cap on this endpoint may also be RAO-denominated like the pool endpoint —
      // if the raw value is implausibly small to be a USD market cap, assume RAO and convert.
      if (state.marketCap !== null && state.marketCap < 1e6 && state.taoPrice) {
        state.marketCap = state.marketCap; // already TAO-unit scale unlikely here, leave as-is
      } else if (state.marketCap !== null && state.marketCap > 1e14) {
        state.marketCap = (state.marketCap / 1e9) * state.taoPrice;
      }

      // Subnet pools, one call per tracked subnet
      // Real taostats /api/dtao/pool/latest/v1 field shapes (confirmed via live response):
      //   price              -> Alpha price denominated in TAO (e.g. 0.0646)
      //   market_cap         -> RAO units (1 TAO = 1e9 RAO), needs /1e9 then *TAO_USD for USD value
      //   liquidity          -> RAO units, same conversion
      //   price_change_1_day -> plain percent number already (e.g. -0.24 means -0.24%)
      //   seven_day_prices   -> array of { timestamp, price } in TAO, ~4hr spacing, for sparkline
      const results = await Promise.allSettled(
        state.watchlist.map(s => fetchTaoStats('/api/dtao/pool/latest/v1?netuid=' + s.netuid))
      );
      results.forEach((r, i) => {
        applySettledPoolResult(state.watchlist[i].netuid, r, state.taoPrice);
      });


      state.lastUpdated = Date.now();
    } catch (e) {
      state.error = e.message || 'Could not reach taostats. Check your API key.';
    }
    state.loading = false;
    render();
  }

  function addSubnet(rawNetuid, label) {
    const netuid = parseInt(rawNetuid, 10);
    if (!netuid || netuid < 1) {
      state.addRowError = 'Enter a valid subnet number (e.g. 8).';
      return false;
    }
    if (state.watchlist.find(s => s.netuid === netuid)) {
      state.addRowError = 'SN' + netuid + ' is already in your watchlist.';
      return false;
    }
    state.watchlist.push({ netuid, label: label || ('SN' + netuid), tag: 'manual' });
    state.addRowError = null;
    savePersisted();
    render();
    if (state.taoPrice) {
      // Already have a TAO price from a prior sync — just fetch this one
      // subnet (1 call) rather than re-fetching the whole watchlist.
      fetchSingleSubnet(netuid);
    } else {
      // No prior sync yet at all, so there's no TAO price to convert with —
      // a full refresh is unavoidable the very first time.
      refreshData();
    }
    return true;
  }
  function removeSubnet(netuid) {
    state.watchlist = state.watchlist.filter(s => s.netuid !== netuid);
    delete state.subnetData[netuid];
    savePersisted();
    render();

                      <div style="flex:1; background:var(--bg-input); border-radius:4px; height:8px; overflow:hidden;">
                        <div style="height:100%; width:${h.pct.toFixed(2)}%; background:var(--amber);"></div>
                      </div>
                      <span style="width:56px; text-align:right; font-size:12px;" class="mono">${h.pct.toFixed(1)}%</span>
                    </div>
                  `).join('')}
                </div>
              ` : ''}
            `;
          })()}
        </div>
      ` : `
        <div class="tao-section-label"><span>Your portfolio</span></div>
        <div class="tao-alloc">
          <div class="tao-keynote">Look up your wallet above to see your actual TAO/Alpha composition here \u2014 this section reflects real holdings, not a hypothetical split.</div>
        </div>
      `}

      <div class="tao-footnote">
        Price, market cap, and liquidity are live via the taostats API. <b style="color:var(--text-dim); font-weight:500;">External revenue figures are not live</b> — they're manually compiled from public reporting and third-party verification (TAO Institute), last checked 2026-06-20, and only exist for subnets with disclosed commercial activity. Most subnets have none yet. The free taostats tier allows roughly 5 requests/minute \u2014 "Sync now" fires every watchlist row at once, so on long watchlists some rows may come back rate-limited. Use the \u21bb next to a row to refresh just that one subnet without re-fetching everything else. Subnet alpha-token markets are thin — treat market caps and 24h moves as directional, not execution-grade prices. This tool is for personal tracking only and is not financial advice.
        <span style="color:var(--amber); cursor:pointer; margin-left:8px;" id="tao-debug-toggle">${state.showDebug ? 'hide raw response' : 'show raw response'}</span>
      </div>
      ${state.showDebug ? `
        <div style="padding:0 24px 20px; font-size:11px;">
          <pre class="mono" style="background:var(--bg-input); border:1px solid var(--line); border-radius:8px; padding:12px; max-height:260px; overflow:auto; white-space:pre-wrap; color:var(--text-dim);">${JSON.stringify(state.rawDebug, null, 2).replace(/</g, '&lt;')}</pre>
        </div>
      ` : ''}
    `;

    // wire up events
    document.getElementById('tao-connect-btn').onclick = () => {
      const v = document.getElementById('tao-key-input').value.trim();
      state.apiKey = v;
      refreshData();
    };
    document.getElementById('tao-clear-btn').onclick = () => {
      state.apiKey = '';
      state.taoPrice = null;
      state.subnetData = {};
      state.lastUpdated = null;
      state.error = null;
      render();
    };
    document.getElementById('tao-wallet-sync-btn').onclick = () => { lookupWallet(); };
    const walletClearBtn = document.getElementById('tao-wallet-clear-btn');
    if (walletClearBtn) {
      walletClearBtn.onclick = () => {
        state.walletAddress = '';
        state.walletHoldings = null;
        state.walletFreeTao = null;
        state.walletError = null;
        savePersisted();
        render();
      };
    }
    document.getElementById('tao-add-toggle').onclick = () => {
      state.addRowOpen = !state.addRowOpen;
      if (state.addRowOpen) state.addRowError = null;
      render();
    };
    document.getElementById('tao-debug-toggle').onclick = () => {
      state.showDebug = !state.showDebug;
      render();
    };
    document.getElementById('tao-add-confirm').onclick = () => {
      const netuid = document.getElementById('tao-add-netuid').value;
      const label = document.getElementById('tao-add-label').value;
      if (!netuid) {
        state.addRowError = 'Enter a subnet number first.';
        render();
        return;
      }
      const ok = addSubnet(netuid, label);
      if (ok) {
        state.addRowOpen = false;
      } else {
        render();
      }
    };
    root.querySelectorAll('[data-remove]').forEach(el => {
      el.onclick = () => removeSubnet(parseInt(el.getAttribute('data-remove'), 10));
    });
    root.querySelectorAll('[data-sync]').forEach(el => {
      el.onclick = () => {
        if (state.rowSyncing) return; // avoid stacking calls if one's already in flight
        fetchSingleSubnet(parseInt(el.getAttribute('data-sync'), 10));
      };
    });
    root.querySelectorAll('[data-rev-edit-netuid]').forEach(el => {
      el.onclick = () => {
        const netuid = parseInt(el.getAttribute('data-rev-edit-netuid'), 10);
        state.revEditNetuid = (state.revEditNetuid === netuid) ? null : netuid;
        render();
      };
    });
    root.querySelectorAll('[data-rev-save-netuid]').forEach(el => {
      el.onclick = () => {
        const netuid = parseInt(el.getAttribute('data-rev-save-netuid'), 10);
        const amountRaw = document.getElementById('rev-edit-amount').value.replace(/[^0-9.]/g, '');
        const amount = parseFloat(amountRaw);
        if (!amount || amount <= 0) {
          state.error = 'Enter a valid revenue amount greater than 0.';
          render();
          return;
        }
        const windowLabel = document.getElementById('rev-edit-window').value.trim() || '90d';
        const verified = document.getElementById('rev-edit-verified').value;
        const note = document.getElementById('rev-edit-note').value.trim();
        const ok = saveRevenueOverride(netuid, {
          rev90d: amount,
          window: windowLabel,
          verified: verified,
          checked: new Date().toISOString().slice(0, 10),
          note: note,
        });
        if (!ok) {
          state.error = 'Could not save revenue edit — storage may be full or disabled.';
        } else {
          state.error = null;
        }
        state.revEditNetuid = null;
        render();
      };
    });
    root.querySelectorAll('[data-rev-cancel]').forEach(el => {
      el.onclick = () => {
        state.revEditNetuid = null;
        render();
      };
    });

    // preserve focus/typing in key input across re-renders triggered elsewhere
    const keyInput = document.getElementById('tao-key-input');
    if (keyInput) {
      keyInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') document.getElementById('tao-connect-btn').click();
      });
    }
  }

  render();
})();
</script>
</div>

<script>
(function() {
  const root = document.getElementById('scr-root');

  let state = {
    apiKey: '',
    subnets: [],
    lastUpdated: null,
    loading: false,
    error: null,
    sortKey: 'marketCapUsd',
    sortDir: 'desc',
    rawDebug: null,
    showDebug: false,
    fetchMode: null,
    immunityDataAvailable: false,
    flowDataAvailable: false,
    viewMode: 'all', // 'all' | 'new'
    searchQuery: '',
    favorites: [], // array of netuids, persisted independently of live subnet data
    newListingDays: 21,
    flowHistory: {},        // { [netuid]: [{t, f, l}, ...] } — raw snapshots only, hydrated from storage on load
    flowHistoryLoaded: false,
    flowHistoryError: null, // last storage read/write error, if any — shown, not hidden
  };

  // ---- Flow history persistence (localStorage) ----
  // Originally built on window.storage (Claude's artifact persistence API),
  // but Claude's artifact sandbox also blocks outbound fetch() to
  // api.taostats.io entirely — so live data only works when this file is
  // opened as a plain HTML file in a normal browser tab, where window.storage
  // doesn't exist. localStorage works in both contexts and keeps this one
  // file fully self-consistent, at the cost of not syncing across devices.
  // Still one combined key for all subnets rather than one per subnet, to
  // keep writes to a single localStorage call per sync regardless of
  // watchlist length.
  const FLOW_HISTORY_KEY = 'tao_dashboard_flow_history_v1';
  const FLOW_HISTORY_MAX_DAYS = 180;
  const FLOW_HISTORY_MAX_ENTRIES = 2000;

  // ---- Favorites (localStorage, own key) ----
  // Deliberately independent of state.subnets (the live, API-populated
  // array) — favoriting a subnet must survive a future sync returning
  // fewer/different subnets, an API failure, or just closing the tab. Same
  // reasoning as why Research Queue notes outlive queue membership.
  const FAVORITES_KEY = 'tao_dashboard_screener_favorites_v1';

  function loadFavorites() {
    try {
      const raw = localStorage.getItem(FAVORITES_KEY);
      state.favorites = raw ? JSON.parse(raw) : [];
      if (!Array.isArray(state.favorites)) state.favorites = [];
    } catch (e) {
      state.favorites = [];
    }
  }

  function saveFavorites() {
    try {
      localStorage.setItem(FAVORITES_KEY, JSON.stringify(state.favorites));
    } catch (e) {
      // Non-fatal — favorite will just not persist this time.
    }
  }

  function toggleFavorite(netuid) {
    if (state.favorites.includes(netuid)) {
      state.favorites = state.favorites.filter(n => n !== netuid);
    } else {
      state.favorites.push(netuid);
    }
    saveFavorites();
    render();
  }

  async function loadFlowHistory() {
    // Uses localStorage, not window.storage — window.storage only exists
    // inside Claude's artifact sandbox, which also blocks outbound fetch()
    // to api.taostats.io entirely. Since live data is the whole point of
    // this tool, localStorage (works in any browser tab, including the
    // downloaded file) is the consistent choice, even though it means flow
    // history is per-browser/device rather than synced via Claude's account.
    try {
      const raw = localStorage.getItem(FLOW_HISTORY_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        state.flowHistory = (parsed && typeof parsed === 'object') ? parsed : {};
      } else {
        state.flowHistory = {};
      }
      state.flowHistoryError = null;
    } catch (e) {
      // Corrupted JSON, private-browsing restrictions, or storage disabled
      // entirely — fall back to an empty history rather than break the page.
      state.flowHistory = {};
      state.flowHistoryError = 'Could not load flow history: ' + (e && e.message ? e.message : 'unknown error');
    }
    state.flowHistoryLoaded = true;
  }

  function trimHistory(arr) {
    const cutoff = Date.now() - FLOW_HISTORY_MAX_DAYS * 24 * 60 * 60 * 1000;
    let trimmed = arr.filter(pt => pt.t >= cutoff);
    if (trimmed.length > FLOW_HISTORY_MAX_ENTRIES) {
      trimmed = trimmed.slice(trimmed.length - FLOW_HISTORY_MAX_ENTRIES);
    }
    return trimmed;
  }

  async function appendAndSaveFlowHistory(subnets) {
    // Append one raw snapshot per subnet currently in view, trim each
    // subnet's array independently against both caps, then write the whole
    // combined object back in a single localStorage write.
    const now = Date.now();
    subnets.forEach(s => {
      if (s.netFlow1dTao === null && s.liquidityUsd === null) return; // nothing real to record
      const key = String(s.netuid);
      const existing = Array.isArray(state.flowHistory[key]) ? state.flowHistory[key] : [];
      existing.push({ t: now, f: s.netFlow1dTao, l: s.liquidityUsd });
      state.flowHistory[key] = trimHistory(existing);
    });
    try {
      localStorage.setItem(FLOW_HISTORY_KEY, JSON.stringify(state.flowHistory));
      state.flowHistoryError = null;
    } catch (e) {
      // Most likely cause: localStorage quota exceeded (~5-10MB depending on
      // browser) if the watchlist is very long and has run for a very long
      // time. Surfaced plainly rather than silently dropping the write.
      state.flowHistoryError = 'Could not save flow history this sync: ' + (e && e.message ? e.message : 'unknown error');
    }
  }

  const RESEARCH_SIGNALS_KEY = 'tao_dashboard_research_signals_v1';

  function saveScreenerSignalsForResearch(subnets) {
    // Writes exactly what the Research Queue's five flag conditions need,
    // computed here from data this script already has — the Research Queue
    // tab is a fully isolated script (same pattern as Alloc/Screener
    // isolation) and reads this localStorage key rather than reaching into
    // this script's in-memory state directly. Flags themselves are also
    // computed here (computeFlags lives in this script now) so there's one
    // source of truth; the Research Queue reads flagCount/flagSummaries
    // rather than recomputing the same logic a second time.
    const total = subnets.length;
    const riskCutoff = total > 10 ? total - 10 : null;
    const snapshot = {};
    subnets.forEach(s => {
      const streak = computeStreak(s.netuid); // already computed from flowHistory, same script
      const inBottomTen = riskCutoff !== null && s.rank !== null && s.rank > riskCutoff;
      const sig = {
        netuid: s.netuid,
        name: s.name,
        netFlow1dTao: s.netFlow1dTao,
        change7d: s.change7d,
        streakCount: streak.available ? streak.count : null,
        streakDir: streak.available ? streak.dir : null,
        hasRevenueData: s.hasRevenueData,
        revLastCheckedDaysAgo: s.revLastCheckedDaysAgo,
        rank: s.rank,
        inBottomTen: inBottomTen,
        isImmune: s.isImmune,
        daysSinceRegistration: s.daysSinceRegistration,
        marketCapUsd: s.marketCapUsd,
        priceUsd: s.priceUsd,
      };
      const flags = computeFlags(sig);
      sig.flagCount = flags.length;
      sig.flagSummaries = flags.map(f => f.summary);
      snapshot[s.netuid] = sig;
    });
    try {
      localStorage.setItem(RESEARCH_SIGNALS_KEY, JSON.stringify({ updatedAt: Date.now(), subnets: snapshot }));
    } catch (e) {
      // Non-fatal — the Research Queue will just show stale/no data for
      // flag computation until a future sync succeeds in writing this.
    }
  }

  function computeStreak(netuid) {
    // Pure, computed at render time from raw history only — no derived
    // fields are ever stored, so changing this definition later doesn't
    // require migrating stored data.
    const arr = state.flowHistory[String(netuid)];
    if (!Array.isArray(arr) || arr.length === 0) {
      return { available: false, count: 0, dir: null, since: null };
    }
    const sorted = arr.slice().sort((a, b) => a.t - b.t);
    const sign = v => (v === null || v === undefined || isNaN(v)) ? null : (v > 0 ? 1 : (v < 0 ? -1 : 0));
    let count = 0;
    let dir = null;
    for (let i = sorted.length - 1; i >= 0; i--) {
      const s = sign(sorted[i].f);
      if (s === null) break; // unknown breaks the streak rather than guessing
      if (dir === null) { dir = s; count = 1; continue; }
      if (s === dir) { count++; } else { break; }
    }
    return {
      available: sorted.length > 0,
      count: count,
      dir: dir, // 1 = inflow streak, -1 = outflow streak, 0 = flat streak, null = unknown
      since: sorted[0].t,
      totalSnapshots: sorted.length,
    };
  }

  function exportFlowHistory() {
    try {
      const blob = new Blob([JSON.stringify(state.flowHistory, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'tao_flow_history_' + new Date().toISOString().slice(0, 10) + '.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    } catch (e) {
      state.flowHistoryError = 'Export failed: ' + (e && e.message ? e.message : 'unknown error');
      render();
    }
  }

  function fmtStreak(streak) {
    if (!streak.available) return { label: 'tracking starts now', color: 'var(--text-faint)' };
    if (streak.dir === null || streak.count === 0) return { label: '\u2014', color: 'var(--text-faint)' };
    const sinceDate = new Date(streak.since);
    const dayLabel = streak.count === 1 ? '1 sync' : streak.count + ' syncs';
    if (streak.dir > 0) return { label: '\u2191 ' + dayLabel, color: 'var(--teal)', title: 'Inflow for ' + streak.count + ' consecutive synced reading(s), tracking since ' + sinceDate.toLocaleDateString() };
    if (streak.dir < 0) return { label: '\u2193 ' + dayLabel, color: 'var(--red)', title: 'Outflow for ' + streak.count + ' consecutive synced reading(s), tracking since ' + sinceDate.toLocaleDateString() };
    return { label: '\u2192 ' + dayLabel, color: 'var(--text-dim)', title: 'Flat for ' + streak.count + ' consecutive synced reading(s)' };
  }

  // ---- Flag computation: moved here from the Research Queue script so the
  // Screener can show flag counts/highlights on its own rows without a
  // round-trip through localStorage. The Research Queue now reads flag
  // *results* from the bridge (computed here) rather than recomputing this
  // logic itself, so there's exactly one place this logic lives. ----
  const REV_STALE_DAYS = 21; // 3 weeks
  const NEW_LISTING_AGE_OUT_MIN = 21;
  const NEW_LISTING_AGE_OUT_MAX = 35;

  function computeFlags(sig) {
    const flags = [];
    if (!sig) return flags;

    if (sig.netFlow1dTao !== null && sig.change7d !== null) {
      const flowSign = sig.netFlow1dTao > 0 ? 1 : (sig.netFlow1dTao < 0 ? -1 : 0);
      const priceSign = sig.change7d > 0 ? 1 : (sig.change7d < 0 ? -1 : 0);
      if (flowSign !== 0 && flowSign !== priceSign) {
        flags.push({
          key: 'divergence',
          summary: 'flow/price divergence',
          question: 'Net flow is ' + sig.netFlow1dTao.toFixed(1) + '\u03c4 over 24h while 7d price moved ' + sig.change7d.toFixed(1) + '% \u2014 is this outflow/inflow concentrated in a few large wallets or broadly distributed? Any news that explains it?',
          readout: [['Net flow (24h)', sig.netFlow1dTao.toFixed(1) + ' \u03c4'], ['7d price change', sig.change7d.toFixed(1) + '%']],
        });
      }
    }

    if (sig.streakCount !== null && sig.streakCount >= 3) {
      const dirWord = sig.streakDir > 0 ? 'inflow' : (sig.streakDir < 0 ? 'outflow' : 'flat');
      flags.push({
        key: 'streak',
        summary: sig.streakCount + '-sync ' + dirWord + ' streak',
        question: dirWord === 'flat'
          ? 'Flow has been flat for ' + sig.streakCount + ' consecutive synced readings \u2014 is this subnet just quiet, or stagnant for a reason worth checking?'
          : 'Net flow has been ' + dirWord + ' for ' + sig.streakCount + ' consecutive synced readings \u2014 is this a sustained trend or a short-term blip? Worth checking recent news/announcements.',
        readout: [['Streak length', sig.streakCount + ' synced readings'], ['Direction', dirWord]],
      });
    }

    if (sig.hasRevenueData && sig.revLastCheckedDaysAgo !== null && sig.revLastCheckedDaysAgo > REV_STALE_DAYS) {
      const weeksAgo = Math.floor(sig.revLastCheckedDaysAgo / 7);
      flags.push({
        key: 'stale-revenue',
        summary: 'revenue data ' + weeksAgo + 'w stale',
        question: 'Revenue data last checked ' + weeksAgo + ' weeks ago \u2014 worth re-verifying given the current flow signal and whether the commercial relationship is still active.',
        readout: [['Days since last checked', Math.round(sig.revLastCheckedDaysAgo)]],
      });
    }

    if (sig.inBottomTen) {
      flags.push({
        key: 'dereg-risk',
        summary: 'deregistration risk zone',
        question: 'Currently ranked ' + (sig.rank !== null ? sig.rank : '?') + ' in pruning order, within the bottom-10 risk zone' + (sig.isImmune ? ' (still inside registration immunity for now)' : '') + ' \u2014 confirm this is still active and check recent registration/emission trend.',
        readout: [['Rank', sig.rank !== null ? sig.rank : '\u2014'], ['Immune', sig.isImmune === true ? 'yes' : (sig.isImmune === false ? 'no' : 'unknown')]],
      });
    }

    if (sig.daysSinceRegistration !== null && sig.daysSinceRegistration > NEW_LISTING_AGE_OUT_MIN && sig.daysSinceRegistration <= NEW_LISTING_AGE_OUT_MAX) {
      flags.push({
        key: 'aging-out',
        summary: 'new listing aging out',
        question: 'Now ' + Math.round(sig.daysSinceRegistration) + ' days old \u2014 just crossed into the window where 7d price/momentum readings become meaningful again. Worth a fresh look now that early listing noise should be settling.',
        readout: [['Days since registration', Math.round(sig.daysSinceRegistration)]],
      });
    }

    return flags;
  }


  function fmtCompactUsd(n) {
    if (n === null || n === undefined || isNaN(n)) return '—';
    const abs = Math.abs(n);
    const sign = n < 0 ? '-' : '';
    if (abs >= 1e9) return sign + '$' + (abs/1e9).toFixed(2) + 'B';
    if (abs >= 1e6) return sign + '$' + (abs/1e6).toFixed(2) + 'M';
    if (abs >= 1e3) return sign + '$' + (abs/1e3).toFixed(1) + 'K';
    return sign + '$' + abs.toFixed(2);
  }
  function fmtPct(n) {
    if (n === null || n === undefined || isNaN(n)) return '—';
    const sign = n > 0 ? '+' : '';
    return sign + n.toFixed(1) + '%';
  }
  function fmtRatio(n) {
    if (n === null || n === undefined || isNaN(n) || !isFinite(n)) return '—';
    return n.toFixed(2);
  }
  function fmtFlow(taoAmount) {
    // Net stake flow, in TAO. Sign indicates direction; a small dead zone
    // around zero is treated as "flat" rather than noise being read as a
    // confident in/outflow signal.
    if (taoAmount === null || taoAmount === undefined || isNaN(taoAmount)) {
      return { label: '—', dir: 'unknown', color: 'var(--text-faint)' };
    }
    const abs = Math.abs(taoAmount);
    const magnitude = abs >= 1000 ? (abs / 1000).toFixed(1) + 'K \u03c4' : abs.toFixed(1) + ' \u03c4';
    if (abs < 1) {
      return { label: '\u2192 flat', dir: 'flat', color: 'var(--text-dim)' };
    }
    if (taoAmount > 0) {
      return { label: '\u2191 ' + magnitude, dir: 'inflow', color: 'var(--teal)' };
    }
    return { label: '\u2193 ' + magnitude, dir: 'outflow', color: 'var(--red)' };
  }
  function firstNum() {
    for (let i = 0; i < arguments.length; i++) {
      const v = arguments[i];
      if (v !== undefined && v !== null && v !== '' && !isNaN(parseFloat(v))) return parseFloat(v);
    }
    return null;
  }
  function timeAgo(ts) {
    if (!ts) return 'never';
    const s = Math.floor((Date.now() - ts) / 1000);
    if (s < 5) return 'just now';
    if (s < 60) return s + 's ago';
    const m = Math.floor(s / 60);
    if (m < 60) return m + 'm ago';
    return Math.floor(m / 60) + 'h ago';
  }

  async function fetchTaoStats(path) {
    const res = await fetch('https://api.taostats.io' + path, {
      headers: { 'Authorization': state.apiKey, 'accept': 'application/json' }
    });
    if (!res.ok) throw new Error('Request failed (' + res.status + ')');
    return res.json();
  }

  const IMMUNITY_DAYS = 122; // ~4 months

  // Mirrored from the Allocation terminal's static revenue table — same data,
  // same "checked" dates. Duplicated rather than shared across the two
  // isolated scripts (consistent with how this file keeps Alloc/Screener/
  // Research fully independent), so the Screener can compute revenue
  // staleness itself and include it in what it writes for the Research Queue.
  const REVENUE_REFERENCE = {
    64:  { rev90d: 1440000, checked: '2026-06-20' },
    4:   { rev90d: 100000,  checked: '2026-06-20' },
    51:  { rev90d: 530000,  checked: '2026-06-20' },
    8:   { rev90d: 100000,  checked: '2026-06-20' },
    93:  { rev90d: 160000,  checked: '2026-06-20' },
    121: { rev90d: 32000,   checked: '2026-06-20' },
    22:  { rev90d: 11000,   checked: '2026-06-20' },
  };

  // Same override key the Allocation terminal writes to — read-only here,
  // so an edit made in one tab is reflected in this tab's staleness
  // computation without needing a second editing UI.
  const REVENUE_OVERRIDE_KEY = 'tao_dashboard_revenue_overrides_v1';
  function getRevenueEntryForFlags(netuid) {
    try {
      const raw = localStorage.getItem(REVENUE_OVERRIDE_KEY);
      const overrides = raw ? JSON.parse(raw) : {};
      if (overrides[netuid]) return overrides[netuid];
    } catch (e) { /* fall through to default */ }
    return REVENUE_REFERENCE[netuid] || null;
  }

  function mapSubnet(d, taoPrice, registeredAt, flowInfo) {
    const priceTao = firstNum(d.price);
    const marketCapTao = d.market_cap !== undefined ? firstNum(d.market_cap) / 1e9 : null;
    const liquidityTao = d.liquidity !== undefined ? firstNum(d.liquidity) / 1e9 : null;
    const buyVol = firstNum(d.tao_buy_volume_24_hr);
    const sellVol = firstNum(d.tao_sell_volume_24_hr);
    let daysSinceRegistration = null;
    let isImmune = null; // null = unknown (no registration data available), not false
    if (registeredAt) {
      const regTime = new Date(registeredAt).getTime();
      if (!isNaN(regTime)) {
        daysSinceRegistration = (Date.now() - regTime) / (1000 * 60 * 60 * 24);
        isImmune = daysSinceRegistration < IMMUNITY_DAYS;
      }
    }
    // Net Tao flow — confirmed real field from /api/subnet/latest/v1, already
    // signed (positive = net inflow, negative = net outflow) and pre-aggregated
    // by taostats across three windows. RAO units, same conversion as everywhere
    // else in this API (1 TAO = 1e9 RAO). This is taoflow-era emissions-relevant
    // data, distinct from price — a subnet can be flat or up on price while
    // bleeding net stake, which is exactly the gap this column is meant to show.
    let netFlow1dTao = null, netFlow7dTao = null, netFlow30dTao = null;
    let flowDataAvailable = false;
    if (flowInfo) {
      const f1 = firstNum(flowInfo.net_flow_1_day);
      const f7 = firstNum(flowInfo.net_flow_7_days);
      const f30 = firstNum(flowInfo.net_flow_30_days);
      if (f1 !== null) { netFlow1dTao = f1 / 1e9; flowDataAvailable = true; }
      if (f7 !== null) { netFlow7dTao = f7 / 1e9; flowDataAvailable = true; }
      if (f30 !== null) { netFlow30dTao = f30 / 1e9; flowDataAvailable = true; }
    }
    const revRef = getRevenueEntryForFlags(d.netuid);
    let revLastCheckedDaysAgo = null;
    if (revRef && revRef.checked) {
      const checkedTime = new Date(revRef.checked).getTime();
      if (!isNaN(checkedTime)) {
        revLastCheckedDaysAgo = (Date.now() - checkedTime) / (1000 * 60 * 60 * 24);
      }
    }
    return {
      netuid: d.netuid,
      name: d.name || ('SN' + d.netuid),
      priceUsd: (taoPrice && priceTao !== null) ? taoPrice * priceTao : null,
      marketCapUsd: (taoPrice && marketCapTao !== null) ? taoPrice * marketCapTao : null,
      liquidityUsd: (taoPrice && liquidityTao !== null) ? taoPrice * liquidityTao : null,
      change24h: firstNum(d.price_change_1_day),
      change7d: firstNum(d.price_change_1_week),
      change1m: firstNum(d.price_change_1_month),
      rank: d.rank !== undefined ? parseInt(d.rank, 10) : null,
      buySellRatio: (buyVol !== null && sellVol) ? buyVol / sellVol : null,
      volume24hTao: firstNum(d.tao_volume_24_hr),
      daysSinceRegistration: daysSinceRegistration,
      isImmune: isImmune,
      netFlow1dTao: netFlow1dTao,
      netFlow7dTao: netFlow7dTao,
      netFlow30dTao: netFlow30dTao,
      netFlow1dUsd: (taoPrice && netFlow1dTao !== null) ? netFlow1dTao * taoPrice : null,
      flowDataAvailable: flowDataAvailable,
      hasRevenueData: !!revRef,
      revLastCheckedDaysAgo: revLastCheckedDaysAgo,
    };
  }

  async function refreshData() {
    if (!state.apiKey) {
      state.error = 'Add your taostats API key above to load the screener.';
      render();
      return;
    }
    state.loading = true;
    state.error = null;
    render();

    try {
      const priceData = await fetchTaoStats('/api/price/latest/v1?asset=tao');
      const p = (priceData && priceData.data && priceData.data[0]) || {};
      const taoPrice = firstNum(p.price, p.price_usd);

      let bulk;
      try {
        bulk = await fetchTaoStats('/api/dtao/pool/latest/v1?page_size=300');
      } catch (e) {
        bulk = null;
      }

      // Second call: try to get registration dates (for immunity) AND net
      // Tao flow (confirmed real fields: net_flow_1_day, net_flow_7_days,
      // net_flow_30_days — already signed, RAO units) from the same
      // /api/subnet/latest/v1 response. Endpoint/field names for registration
      // were confirmed live earlier; flow fields were confirmed live in the
      // same payload, so no extra API call needed for this signal.
      let regInfo = null;
      let regFetchOk = false;
      try {
        regInfo = await fetchTaoStats('/api/subnet/latest/v1?page_size=300');
        regFetchOk = Array.isArray(regInfo && regInfo.data) && regInfo.data.length > 5;
      } catch (e) {
        regFetchOk = false;
      }
      const regByNetuid = {};
      const flowByNetuid = {};
      if (regFetchOk) {
        regInfo.data.forEach(r => {
          const ts = r.registered_at || r.registration_timestamp || r.created_at || r.timestamp;
          if (r.netuid !== undefined && ts) regByNetuid[r.netuid] = ts;
          if (r.netuid !== undefined && (r.net_flow_1_day !== undefined || r.net_flow_7_days !== undefined || r.net_flow_30_days !== undefined)) {
            flowByNetuid[r.netuid] = {
              net_flow_1_day: r.net_flow_1_day,
              net_flow_7_days: r.net_flow_7_days,
              net_flow_30_days: r.net_flow_30_days,
            };
          }
        });
      }
      state.immunityDataAvailable = regFetchOk && Object.keys(regByNetuid).length > 0;
      state.flowDataAvailable = regFetchOk && Object.keys(flowByNetuid).length > 0;

      if (bulk && Array.isArray(bulk.data) && bulk.data.length > 5) {
        state.fetchMode = 'bulk (' + bulk.data.length + ' subnets in one call)';
        // Exclude netuid 0 (Root) — it's the meta-subnet, always priced at 1 TAO
        // by definition, not an investable Alpha token. Including it skews the
        // combined market cap and gives it a misleading "rank 0" that isn't a
        // real safety signal the way it is for actual subnets.
        state.subnets = bulk.data.filter(d => d.netuid !== 0).map(d => mapSubnet(d, taoPrice, regByNetuid[d.netuid], flowByNetuid[d.netuid]));
        state.rawDebug = {
          price: priceData,
          bulk_total: bulk.data.length,
          reg_info_total_rows: regFetchOk ? regInfo.data.length : 0,
          reg_by_netuid_count: Object.keys(regByNetuid).length,
          flow_by_netuid_count: Object.keys(flowByNetuid).length,
          flow_sample_sn40: flowByNetuid[40] || 'not found',
          reg_by_netuid_sample_keys: Object.keys(regByNetuid).slice(0, 15),
          lookup_check_sn40_ralph: { found: regByNetuid[40] !== undefined, value: regByNetuid[40] || null },
          lookup_check_sn82_compelle: { found: regByNetuid[82] !== undefined, value: regByNetuid[82] || null },
          computed_immunity_for_sn40: state.subnets.find(s => s.netuid === 40) ? { isImmune: state.subnets.find(s => s.netuid === 40).isImmune, daysSinceRegistration: state.subnets.find(s => s.netuid === 40).daysSinceRegistration } : 'not found in subnets list',
        };
      } else {
        state.error = 'Bulk endpoint did not return a full subnet list (got ' + (bulk && bulk.data ? bulk.data.length : 0) + ' rows). Falling back is not yet implemented in this build — try Sync again, or this may indicate the free tier rate limit (5 req/min) was hit.';
        state.rawDebug = { price: priceData, bulk_raw: bulk };
      }
      state.lastUpdated = Date.now();
      if (Array.isArray(state.subnets) && state.subnets.length > 0) {
        // Fire-and-await the history append/save, but don't let a storage
        // hiccup break the sync that already succeeded — render now with
        // fresh price data, history error (if any) surfaces on next render.
        await appendAndSaveFlowHistory(state.subnets);
        saveScreenerSignalsForResearch(state.subnets);
      }
    } catch (e) {
      state.error = e.message || 'Could not reach taostats. Check your API key.';
    }
    state.loading = false;
    render();
  }

  function sortedSubnets() {
    let arr = state.subnets.slice();
    if (state.viewMode === 'new') {
      arr = arr.filter(s => s.daysSinceRegistration !== null && s.daysSinceRegistration <= state.newListingDays);
    }
    if (state.searchQuery && state.searchQuery.trim()) {
      const q = state.searchQuery.trim().toLowerCase().replace(/^sn/, '');
      arr = arr.filter(s => String(s.netuid).includes(q) || (s.name && s.name.toLowerCase().includes(q)));
    }
    const key = state.sortKey;
    const dir = state.sortDir === 'asc' ? 1 : -1;
    arr.sort((a, b) => {
      const av = a[key], bv = b[key];
      if (av === null || av === undefined) return 1;
      if (bv === null || bv === undefined) return -1;
      return (av - bv) * dir;
    });
    return arr;
  }

  function setViewMode(mode) {
    state.viewMode = mode;
    if (mode === 'new') {
      state.sortKey = 'daysSinceRegistration';
      state.sortDir = 'asc';
    } else {
      state.sortKey = 'marketCapUsd';
      state.sortDir = 'desc';
    }
    render();
  }

  function median(arr) {
    const vals = arr.filter(v => v !== null && v !== undefined && !isNaN(v)).slice().sort((a, b) => a - b);
    if (vals.length === 0) return null;
    const mid = Math.floor(vals.length / 2);
    return vals.length % 2 !== 0 ? vals[mid] : (vals[mid - 1] + vals[mid]) / 2;
  }

  function setSort(key) {
    if (state.sortKey === key) {
      state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
    } else {
      state.sortKey = key;
      state.sortDir = 'desc';
    }
    render();
  }

  function sortArrow(key) {
    if (state.sortKey !== key) return '';
    return '<span class="scr-sort-arrow">' + (state.sortDir === 'asc' ? '\u25B2' : '\u25BC') + '</span>';
  }

  function render() {
    const total = state.subnets.length;
    const totalMcap = state.subnets.reduce((s, x) => s + (x.marketCapUsd || 0), 0);
    const riskCutoff = total > 10 ? total - 10 : null;
    // Momentum is relative to the cohort, not a fixed number — a flat +20%
    // move means something different in a week the whole sector is up 80%
    // versus a week it's down double digits. Flag outperformance of the
    // median 7d move by a meaningful margin, recomputed every sync.
    const med7d = median(state.subnets.map(s => s.change7d));
    const momentumThreshold = med7d !== null ? med7d + 15 : 20;

    // Compute flag count/summaries on every subnet before sorting, so
    // "sort by flags" has something real to sort against. Recomputed every
    // render — cheap, and always reflects the current riskCutoff/momentum
    // context rather than a stale snapshot from sync time.
    state.subnets.forEach(s => {
      const streak = computeStreak(s.netuid);
      const sig = {
        netFlow1dTao: s.netFlow1dTao,
        change7d: s.change7d,
        streakCount: streak.available ? streak.count : null,
        streakDir: streak.available ? streak.dir : null,
        hasRevenueData: s.hasRevenueData,
        revLastCheckedDaysAgo: s.revLastCheckedDaysAgo,
        rank: s.rank,
        inBottomTen: riskCutoff !== null && s.rank !== null && s.rank > riskCutoff,
        isImmune: s.isImmune,
        daysSinceRegistration: s.daysSinceRegistration,
      };
      const flags = computeFlags(sig);
      s.flagCount = flags.length;
      s.flagSummaries = flags.map(f => f.summary);
      s.isFavorite = state.favorites.includes(s.netuid) ? 1 : 0; // numeric for sort consistency with other columns
    });

    const list = sortedSubnets();

    root.innerHTML = `
      <div class="scr-header">
        <div>
          <div class="scr-title">Subnet screener</div>
          <div class="scr-subtitle">All tracked subnets, ranked by live on-chain signals</div>
        </div>
        <div class="scr-updated"><div>Last synced</div><div><b>${timeAgo(state.lastUpdated)}</b></div></div>
      </div>

      <div class="scr-keybar">
        <input id="scr-key-input" type="password" placeholder="Paste your taostats API key (same key as Allocation terminal)" value="${state.apiKey}" />
        <button class="scr-btn" id="scr-sync-btn">${state.loading ? 'Syncing…' : 'Sync now'}</button>
        <button class="scr-btn secondary" id="scr-clear-btn">Clear</button>
        <div class="scr-note">${state.error ? '⚠ ' + state.error : (state.fetchMode ? 'Loaded via ' + state.fetchMode + '.' : 'Key stays in this browser tab only.')}</div>
      </div>

      <div style="padding:14px 24px 0; display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
        <button class="scr-viewbtn ${state.viewMode === 'all' ? 'active' : ''}" id="scr-view-all">All subnets</button>
        <button class="scr-viewbtn ${state.viewMode === 'new' ? 'active' : ''}" id="scr-view-new">New listings (\u226421d)</button>
        <input id="scr-search-input" type="text" placeholder="Search netuid or name\u2026" value="${(state.searchQuery || '').replace(/"/g, '&quot;')}" style="background:var(--bg-input); border:1px solid var(--line); color:var(--text); font-family:'JetBrains Mono',monospace; font-size:12px; padding:7px 10px; border-radius:7px; outline:none; width:170px;" />
        <span style="flex:1;"></span>
        <button class="scr-viewbtn" id="scr-export-flow-btn" title="Download the raw flow history JSON as a backup">Download flow history</button>
      </div>
      ${state.flowHistoryError ? `<div style="padding:6px 24px 0; font-size:11px; color:var(--red);">⚠ ${state.flowHistoryError}</div>` : (!state.flowHistoryLoaded ? `<div style="padding:6px 24px 0; font-size:11px; color:var(--text-faint);">Loading flow history…</div>` : '')}

      ${state.viewMode === 'new' ? `
        <div class="scr-summary">
          <div class="scr-summary-cell"><div class="scr-summary-label">New listings</div><div class="scr-summary-value">${list.length}</div></div>
          <div class="scr-summary-cell"><div class="scr-summary-label">Combined mkt cap</div><div class="scr-summary-value">${fmtCompactUsd(list.reduce((s, x) => s + (x.marketCapUsd || 0), 0))}</div></div>
          <div class="scr-summary-cell"><div class="scr-summary-label">Median buy/sell</div><div class="scr-summary-value" style="font-size:18px;">${fmtRatio(median(list.map(s => s.buySellRatio)))}</div></div>
          <div class="scr-summary-cell"><div class="scr-summary-label">Immunity window</div><div class="scr-summary-value" style="font-size:14px;">~122 days</div></div>
        </div>
      ` : `
        <div class="scr-summary">
          <div class="scr-summary-cell"><div class="scr-summary-label">Subnets loaded</div><div class="scr-summary-value">${total || '—'}</div></div>
          <div class="scr-summary-cell"><div class="scr-summary-label">Combined mkt cap</div><div class="scr-summary-value">${fmtCompactUsd(totalMcap)}</div></div>
          <div class="scr-summary-cell"><div class="scr-summary-label">Median 7d move</div><div class="scr-summary-value" style="font-size:18px; ${med7d > 0 ? 'color:var(--teal)' : (med7d < 0 ? 'color:var(--red)' : '')}">${med7d !== null ? fmtPct(med7d) : '—'}</div></div>
          <div class="scr-summary-cell"><div class="scr-summary-label">Deregistration risk</div><div class="scr-summary-value" style="font-size:14px;">bottom 10${state.immunityDataAvailable ? ', immunity-checked' : ' by rank'}</div></div>
        </div>
      `}

      <div class="scr-table-wrap">
        <table class="scr-table">
          ${state.viewMode === 'new' ? `
            <thead>
              <tr>
                <th><span class="scr-fav-sort" data-sort="isFavorite" title="Sort by favorites">\u2605</span> Subnet${sortArrow('name')}</th>
                <th class="num" data-sort="daysSinceRegistration">Age (days) ${sortArrow('daysSinceRegistration')}</th>
                <th class="num" data-sort="priceUsd">Price ${sortArrow('priceUsd')}</th>
                <th class="num" data-sort="marketCapUsd">Mkt cap ${sortArrow('marketCapUsd')}</th>
                <th class="num" data-sort="liquidityUsd">Liquidity ${sortArrow('liquidityUsd')}</th>
                <th class="num" data-sort="buySellRatio">Buy/Sell ${sortArrow('buySellRatio')}</th>
                <th class="num" data-sort="netFlow1dTao">Net flow (24h) ${sortArrow('netFlow1dTao')}</th>
                <th class="num">Flow streak</th>
                <th class="num" data-sort="change24h">24h ${sortArrow('change24h')}</th>
                <th class="num" data-sort="flagCount">Flags ${sortArrow('flagCount')}</th>
                <th class="num"></th>
              </tr>
            </thead>
            <tbody>
              ${list.length === 0 ? `<tr><td colspan="11" class="scr-empty">No subnets registered in the last ${state.newListingDays} days right now.</td></tr>` :
                list.map(s => {
                  const deltaClass24 = s.change24h > 0 ? 'style="color:var(--teal)"' : (s.change24h < 0 ? 'style="color:var(--red)"' : '');
                  const bsHigh = s.buySellRatio !== null && s.buySellRatio > 1.3;
                  const bsLow = s.buySellRatio !== null && s.buySellRatio < 0.7;
                  const flow1d = fmtFlow(s.netFlow1dTao);
                  const streak = fmtStreak(computeStreak(s.netuid));
                  const flagCount = s.flagCount || 0;
                  return `
                    <tr>
                      <td><span class="scr-fav-star ${s.isFavorite ? 'active' : ''}" data-fav-netuid="${s.netuid}" title="${s.isFavorite ? 'Remove from favorites' : 'Add to favorites'}">${s.isFavorite ? '\u2605' : '\u2606'}</span><span class="scr-sn-tag">SN${s.netuid}</span>${s.name}</td>
                      <td class="num mono">${s.daysSinceRegistration !== null ? s.daysSinceRegistration.toFixed(1) : '—'}</td>
                      <td class="num mono">${s.priceUsd !== null ? '$' + s.priceUsd.toFixed(2) : '—'}</td>
                      <td class="num mono">${fmtCompactUsd(s.marketCapUsd)}</td>
                      <td class="num mono">${fmtCompactUsd(s.liquidityUsd)}</td>
                      <td class="num mono" style="${bsHigh ? 'color:var(--teal)' : (bsLow ? 'color:var(--red)' : '')}">${fmtRatio(s.buySellRatio)}</td>
                      <td class="num mono" style="color:${flow1d.color}">${flow1d.label}</td>
                      <td class="num mono" style="color:${streak.color}" title="${(streak.title || '').replace(/"/g, '&quot;')}">${streak.label}</td>
                      <td class="num mono" ${deltaClass24}>${fmtPct(s.change24h)}</td>
                      <td class="num mono" style="color:var(--text-dim);" title="${(s.flagSummaries || []).join(', ').replace(/"/g, '&quot;')}">${flagCount > 0 ? flagCount : '\u2014'}</td>
                      <td class="num"><span class="scr-research-icon" data-research-netuid="${s.netuid}" title="Add SN${s.netuid} to Research Queue">\u2691</span></td>
                    </tr>
                  `;
                }).join('')
              }
            </tbody>
          ` : `
            <thead>
              <tr>
                <th><span class="scr-fav-sort" data-sort="isFavorite" title="Sort by favorites">\u2605</span> Subnet${sortArrow('name')}</th>
                <th class="num" data-sort="priceUsd">Price ${sortArrow('priceUsd')}</th>
                <th class="num" data-sort="marketCapUsd">Mkt cap ${sortArrow('marketCapUsd')}</th>
                <th class="num" data-sort="liquidityUsd">Liquidity ${sortArrow('liquidityUsd')}</th>
                <th class="num" data-sort="change24h">24h ${sortArrow('change24h')}</th>
                <th class="num" data-sort="change7d">7d ${sortArrow('change7d')}</th>
                <th class="num" data-sort="netFlow1dTao">Net flow (24h) ${sortArrow('netFlow1dTao')}</th>
                <th class="num">Flow streak</th>
                <th class="num" data-sort="buySellRatio">Buy/Sell ${sortArrow('buySellRatio')}</th>
                <th class="num" data-sort="rank">Rank ${sortArrow('rank')}</th>
                <th class="num" data-sort="flagCount">Flags ${sortArrow('flagCount')}</th>
                <th class="num"></th>
              </tr>
            </thead>
            <tbody>
              ${list.length === 0 ? `<tr><td colspan="12" class="scr-empty">No data yet — paste your API key and click Sync now.</td></tr>` :
                list.map(s => {
                  const deltaClass24 = s.change24h > 0 ? 'style="color:var(--teal)"' : (s.change24h < 0 ? 'style="color:var(--red)"' : '');
                  const deltaClass7 = s.change7d > 0 ? 'style="color:var(--teal)"' : (s.change7d < 0 ? 'style="color:var(--red)"' : '');
                  const inBottomTen = riskCutoff !== null && s.rank !== null && s.rank > riskCutoff;
                  const isRisk = inBottomTen && s.isImmune !== true;
                  const isProtected = inBottomTen && s.isImmune === true;
                  // Momentum, in the steady-state view, is only meaningful for
                  // subnets old enough that a 7d window isn't mostly measuring
                  // their own initial listing — new listings have their own view.
                  const isHot = s.change7d !== null && s.change7d > momentumThreshold && s.daysSinceRegistration !== null && s.daysSinceRegistration > 21;
                  const flow1d = fmtFlow(s.netFlow1dTao);
                  const streak = fmtStreak(computeStreak(s.netuid));
                  const flagCount = s.flagCount || 0;
                  return `
                    <tr>
                      <td><span class="scr-fav-star ${s.isFavorite ? 'active' : ''}" data-fav-netuid="${s.netuid}" title="${s.isFavorite ? 'Remove from favorites' : 'Add to favorites'}">${s.isFavorite ? '\u2605' : '\u2606'}</span><span class="scr-sn-tag">SN${s.netuid}</span>${s.name}${isRisk ? '<span class="scr-flag risk">deregistration risk</span>' : ''}${isProtected ? '<span class="scr-flag protected">bottom-ranked, immune</span>' : ''}${isHot ? '<span class="scr-flag hot">momentum</span>' : ''}</td>
                      <td class="num mono">${s.priceUsd !== null ? '$' + s.priceUsd.toFixed(2) : '—'}</td>
                      <td class="num mono">${fmtCompactUsd(s.marketCapUsd)}</td>
                      <td class="num mono">${fmtCompactUsd(s.liquidityUsd)}</td>
                      <td class="num mono" ${deltaClass24}>${fmtPct(s.change24h)}</td>
                      <td class="num mono" ${deltaClass7}>${fmtPct(s.change7d)}</td>
                      <td class="num mono" style="color:${flow1d.color}">${flow1d.label}</td>
                      <td class="num mono" style="color:${streak.color}" title="${(streak.title || '').replace(/"/g, '&quot;')}">${streak.label}</td>
                      <td class="num mono">${fmtRatio(s.buySellRatio)}</td>
                      <td class="num mono">${s.rank !== null ? s.rank : '—'}</td>
                      <td class="num mono" style="color:var(--text-dim);" title="${(s.flagSummaries || []).join(', ').replace(/"/g, '&quot;')}">${flagCount > 0 ? flagCount : '\u2014'}</td>
                      <td class="num"><span class="scr-research-icon" data-research-netuid="${s.netuid}" title="Add SN${s.netuid} to Research Queue">\u2691</span></td>
                    </tr>
                  `;
                }).join('')
              }
            </tbody>
          `}
        </table>
      </div>


      <div class="scr-footnote">
        ${state.viewMode === 'new' ? `
          Showing subnets registered in the last ${state.newListingDays} days, sorted youngest-first by default. Price/market cap moves on subnets this new mostly reflect early, thin-liquidity price discovery rather than the kind of trend the "momentum" flag captures elsewhere — read 24h% and Buy/Sell ratio (net accumulation vs. distribution) as more meaningful here than longer-window percentages. "Net flow (24h)" is real net Tao inflow/outflow from taostats, not a price-derived proxy \u2014 under Bittensor's flow-based emission model, sustained outflow is what actually drives a subnet toward reduced emissions, regardless of what price is doing. ${state.flowDataAvailable ? '' : 'Flow data did not load this sync, so net flow is shown as unknown for all subnets this time \u2014 try syncing again. '}"Flow streak" counts consecutive synced readings in the same direction, built from your own sync history (saved in this browser, 180-day / 2,000-snapshot rolling window per subnet) \u2014 it only goes as far back as when you started tracking on this device/browser, shown honestly as "tracking starts now" for anything new rather than a fake streak. All are inside their ~4-month registration immunity, so deregistration is not a near-term risk regardless of rank. This view can't yet show whether liquidity is growing or shrinking day-over-day — that needs price history across multiple syncs, which isn't tracked yet. Excludes Root (SN0). Not financial advice.
        ` : `
          All figures live via the taostats API, excluding the Root network (SN0), which isn't an investable Alpha token. "Deregistration risk" flags subnets ranked in the bottom 10 that are NOT inside their ~4-month registration immunity window — taostats deregisters the lowest-ranked eligible subnet whenever a new one registers, so this is a real mechanical risk, not a prediction. Bottom-ranked subnets still inside immunity show "bottom-ranked, immune" instead, since they can't actually be deregistered yet. ${state.immunityDataAvailable ? '' : 'Registration-date data did not load this sync, so immunity status is currently unknown for all subnets and every bottom-10 subnet is shown as at-risk by default — treat this as a conservative upper bound, not confirmed risk. '}"Net flow (24h)" is real net Tao inflow/outflow into the subnet's pool, sourced directly from taostats \u2014 distinct from price momentum, and arguably more important under the post-Taoflow emission model, since sustained net outflow is what actually drives emissions toward zero, independent of price. ${state.flowDataAvailable ? '' : 'Flow data did not load this sync, so net flow is shown as unknown for all subnets this time \u2014 try syncing again. '}"Flow streak" counts consecutive synced readings in the same direction, built from your own accumulated sync history (saved in this browser via localStorage, 180-day / 2,000-snapshot rolling window per subnet \u2014 tied to this browser/device, not synced elsewhere) \u2014 it reflects how long you've personally been tracking each subnet here, not a longer history we don't actually have; "tracking starts now" means exactly that. "Momentum" flags subnets older than 21 days beating the cohort's own median 7-day move by 15+ points, recalculated every sync — newer subnets are excluded from this flag since their 7d window mostly predates their own listing, and have their own dedicated view instead. It can still reflect genuine traction or thin-liquidity volatility — check liquidity before reading too much into it. This is not financial advice.
        `}
        <span style="color:var(--amber); cursor:pointer; margin-left:8px;" id="scr-debug-toggle">${state.showDebug ? 'hide raw response' : 'show raw response'}</span>
      </div>
      ${state.showDebug ? `<div style="padding:0 24px 20px; font-size:11px;"><pre class="mono" style="background:var(--bg-input); border:1px solid var(--line); border-radius:8px; padding:12px; max-height:260px; overflow:auto; white-space:pre-wrap; color:var(--text-dim);">${JSON.stringify(state.rawDebug, null, 2).replace(/</g, '&lt;')}</pre></div>` : ''}
    `;

    document.getElementById('scr-sync-btn').onclick = () => {
      state.apiKey = document.getElementById('scr-key-input').value.trim();
      refreshData();
    };
    document.getElementById('scr-clear-btn').onclick = () => {
      state.apiKey = ''; state.subnets = []; state.lastUpdated = null; state.error = null; state.fetchMode = null;
      render();
    };
    document.getElementById('scr-debug-toggle').onclick = () => { state.showDebug = !state.showDebug; render(); };
    document.getElementById('scr-view-all').onclick = () => setViewMode('all');
    document.getElementById('scr-view-new').onclick = () => setViewMode('new');
    const searchInput = document.getElementById('scr-search-input');
    if (searchInput) {
      let searchDebounce = null;
      searchInput.oninput = (e) => {
        const val = e.target.value;
        clearTimeout(searchDebounce);
        searchDebounce = setTimeout(() => {
          state.searchQuery = val;
          render();
          // Restore focus and cursor after the re-render rebuilds the input.
          const reInput = document.getElementById('scr-search-input');
          if (reInput) {
            reInput.focus();
            reInput.setSelectionRange(reInput.value.length, reInput.value.length);
          }
        }, 200);
      };
    }
    root.querySelectorAll('th[data-sort]').forEach(th => {
      th.onclick = () => setSort(th.getAttribute('data-sort'));
    });
    root.querySelectorAll('.scr-fav-sort[data-sort]').forEach(el => {
      el.onclick = (e) => {
        e.stopPropagation(); // avoid double-triggering if the parent th also has a sort handler
        setSort(el.getAttribute('data-sort'));
      };
    });
    root.querySelectorAll('[data-research-netuid]').forEach(el => {
      el.onclick = (e) => {
        e.stopPropagation();
        const netuid = el.getAttribute('data-research-netuid');
        try {
          localStorage.setItem('tao_dashboard_research_pending_add_v1', netuid);
        } catch (err) { /* non-fatal — clicking again will retry */ }
        // Reuse the same tab-switching function the tab bar itself uses,
        // rather than introducing a second navigation mechanism.
        if (typeof window.taoShowPane === 'function') window.taoShowPane('research');
      };
    });
    root.querySelectorAll('[data-fav-netuid]').forEach(el => {
      el.onclick = (e) => {
        e.stopPropagation();
        toggleFavorite(parseInt(el.getAttribute('data-fav-netuid'), 10));
      };
    });
    const exportBtn = document.getElementById('scr-export-flow-btn');
    if (exportBtn) exportBtn.onclick = () => exportFlowHistory();
  }

  loadFavorites();
  render();
  loadFlowHistory().then(() => render());
})();
</script>
</div>

<div id="tao-pane-research" style="display:none;">
<div id="rq-root"></div>
<style>
  #rq-root, #rq-root * { box-sizing: border-box; }

    --line: #2A2D33;
    --text: #EDEAE3;
    --text-dim: #8C8A84;
    --text-faint: #5C5A56;
    --amber: #C8893B;
    --teal: #4FB3A0;
    --red: #C75450;
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    border-radius: 14px;

    max-width: 880px;
    margin: 0 auto;
    overflow: hidden;
    border: 1px solid var(--line);
  }
  #rq-root .mono { font-family: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace; }
  .rq-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: flex-start; }

  .rq-controlbar { padding: 12px 24px; background: var(--bg-raised); border-bottom: 1px solid var(--line); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .rq-controlbar input { background: var(--bg-input); border: 1px solid var(--line); color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 8px 10px; border-radius: 6px; outline: none; width: 140px; }
  .rq-controlbar input:focus { border-color: var(--amber); }
  .rq-btn { background: var(--amber); color: #1A1305; border: none; font-family: 'Inter', sans-serif; font-size: 12.5px; font-weight: 600; padding: 8px 14px; border-radius: 7px; cursor: pointer; white-space: nowrap; }
  .rq-btn.secondary { background: transparent; border: 1px solid var(--line); color: var(--text-dim); }

  .rq-sn-name { font-weight: 600; font-size: 14px; flex-shrink: 0; }

  .rq-flagcount { font-size: 11px; color: var(--text-faint); background: var(--bg-input); padding: 3px 9px; border-radius: 10px; flex-shrink: 0; white-space: nowrap; }
  .rq-manual-tag { font-size: 10px; color: var(--text-faint); border: 1px solid var(--line); padding: 2px 6px; border-radius: 4px; flex-shrink: 0; }
  .rq-chevron { color: var(--text-faint); flex-shrink: 0; transition: transform 0.15s; }
  .rq-chevron.open { transform: rotate(90deg); }

  .rq-question input[type="checkbox"] { margin-top: 3px; width: 16px; height: 16px; accent-color: var(--amber); cursor: pointer; flex-shrink: 0; }

  .rq-question.resolved .rq-question-text { color: var(--text-faint); text-decoration: line-through; }

  .rq-readout-row { display: flex; justify-content: space-between; padding: 2px 0; }
  .rq-readout-row .mono { color: var(--text); }

  .rq-note-entry { background: var(--bg-input); border: 1px solid var(--line); border-radius: 7px; padding: 9px 11px; margin-bottom: 7px; font-size: 13px; line-height: 1.45; }
  .rq-note-ts { font-size: 10.5px; color: var(--text-faint); margin-bottom: 4px; font-family: 'JetBrains Mono', monospace; }
  .rq-notes-input-row { display: flex; gap: 8px; align-items: flex-start; }
  .rq-notes-input-row textarea { flex: 1; background: var(--bg-input); border: 1px solid var(--line); color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px; padding: 9px 11px; border-radius: 7px; outline: none; resize: vertical; min-height: 60px; }
  .rq-notes-input-row textarea:focus { border-color: var(--amber); }
