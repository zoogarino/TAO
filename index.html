  .rq-remove:hover { color: var(--red); }
  .rq-footnote { padding: 12px 24px 18px; font-size: 11px; color: var(--text-faint); border-top: 1px solid var(--line); line-height: 1.6; }
</style>

<script>
(function() {
  const root = document.getElementById('rq-root');

  const RESEARCH_SIGNALS_KEY = 'tao_dashboard_research_signals_v1';
  const REV_STALE_DAYS = 21; // 3 weeks
  const NEW_LISTING_AGE_OUT_MIN = 21;  // momentum becomes meaningful again past this age
  const NEW_LISTING_AGE_OUT_MAX = 35;  // beyond this, it's just an established subnet, not a freshly-aged-out one

  let state = {
    queue: [],            // array of netuids, manually or auto added
    expanded: {},          // [netuid] -> bool
    answers: {},           // [netuid] -> { [flagKey]: true } — true = resolved
    showResolved: {},      // [netuid] -> bool, toggles the resolved sub-list visibility
    signals: null,         // loaded from the Screener's localStorage bridge
    signalsUpdatedAt: null,
    addError: null,
    notes: {},             // [netuid] -> [{text, timestamp}, ...], append-only, persists independently of queue membership
    noteDraft: {},         // [netuid] -> in-progress textarea content, not yet saved
    persistError: null,
  };

  // ---- Persistence (localStorage, same mechanism as the watchlist/wallet
  // address/flow history elsewhere in this file). Two separate keys, on
  // purpose: queue membership + checkbox state in one, notes in another —
  // so removing a subnet from the queue can never accidentally wipe its
  // notes, since they're not stored together at all. ----
  const QUEUE_STATE_KEY = 'tao_dashboard_research_queue_v1';
  const NOTES_STORAGE_KEY = 'tao_dashboard_research_notes_v1';

  function loadQueueState() {
    try {
      const raw = localStorage.getItem(QUEUE_STATE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        state.queue = Array.isArray(parsed.queue) ? parsed.queue : [];
        state.answers = (parsed.answers && typeof parsed.answers === 'object') ? parsed.answers : {};
      }
    } catch (e) {
      // Corrupted JSON or storage disabled — start from an empty queue
      // rather than break the page.
      state.queue = [];
      state.answers = {};
    }
  }

  function saveQueueState() {
    try {
      localStorage.setItem(QUEUE_STATE_KEY, JSON.stringify({ queue: state.queue, answers: state.answers }));
      state.persistError = null;
    } catch (e) {
      state.persistError = 'Could not save research queue: ' + (e && e.message ? e.message : 'unknown error');
    }
  }

  function loadNotesState() {
    try {
      const raw = localStorage.getItem(NOTES_STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        state.notes = (parsed && typeof parsed === 'object') ? parsed : {};
      }
    } catch (e) {
      state.notes = {};
    }
  }

  function saveNotesState() {
    try {
      localStorage.setItem(NOTES_STORAGE_KEY, JSON.stringify(state.notes));
      state.persistError = null;
    } catch (e) {
      state.persistError = 'Could not save notes: ' + (e && e.message ? e.message : 'unknown error');
    }
  }

  function loadSignals() {
    try {
      const raw = localStorage.getItem(RESEARCH_SIGNALS_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        state.signals = (parsed && parsed.subnets) || {};
        state.signalsUpdatedAt = parsed && parsed.updatedAt || null;
      } else {
        state.signals = {};
      }
    } catch (e) {
      state.signals = {};
    }
  }

  // ---- Flag computation: five conditions, each a simple boolean test against
  // the Screener's bridged signals. Purely a count for sorting — never shown
  // as a score or verdict.
  // NOTE: this is intentionally a duplicate of the Screener's own computeFlags
  // (Alloc/Screener/Research are isolated scripts with no shared module
  // system in this single-file setup). The Screener's copy only needs
  // flagCount/flagSummaries for its table; this copy also produces the full
  // question/readout text the Research Queue cards render. If the flag
  // conditions ever change, both copies need updating together. ----
  function computeFlags(sig) {
    const flags = [];
    if (!sig) return flags;

    // 1. Flow/price divergence — 24h net flow direction disagrees in sign
    // with 7d price trend.
    if (sig.netFlow1dTao !== null && sig.change7d !== null) {
      const flowSign = sig.netFlow1dTao > 0 ? 1 : (sig.netFlow1dTao < 0 ? -1 : 0);
      const priceSign = sig.change7d > 0 ? 1 : (sig.change7d < 0 ? -1 : 0);
      if (flowSign !== 0 && flowSign !== priceSign) {
        flags.push({
          key: 'divergence',
          summary: 'flow/price divergence',
          question: 'Net flow is ' + sig.netFlow1dTao.toFixed(1) + '\u03c4 over 24h while 7d price moved ' + sig.change7d.toFixed(1) + '% \u2014 is this outflow/inflow concentrated in a few large wallets or broadly distributed? Any news that explains it?',
          readout: [['Net flow (24h)', sig.netFlow1dTao.toFixed(1) + ' \u03c4'], ['7d price change', sig.change7d.toFixed(1) + '%']],
        });
      }
    }

    // 2. Flow streak — 3+ consecutive same-direction readings (only if streak
    // tracking has actually produced data; skipped entirely otherwise).
    if (sig.streakCount !== null && sig.streakCount >= 3) {
      const dirWord = sig.streakDir > 0 ? 'inflow' : (sig.streakDir < 0 ? 'outflow' : 'flat');
      flags.push({
        key: 'streak',
        summary: sig.streakCount + '-sync ' + dirWord + ' streak',
        question: dirWord === 'flat'
          ? 'Flow has been flat for ' + sig.streakCount + ' consecutive synced readings \u2014 is this subnet just quiet, or stagnant for a reason worth checking?'
          : 'Net flow has been ' + dirWord + ' for ' + sig.streakCount + ' consecutive synced readings \u2014 is this a sustained trend or a short-term blip? Worth checking recent news/announcements.',
        readout: [['Streak length', sig.streakCount + ' synced readings'], ['Direction', dirWord]],
      });
    }

    // 3. Stale revenue data — only applies to subnets with any revenue
    // reference at all; flags if last checked more than 3 weeks ago.
    if (sig.hasRevenueData && sig.revLastCheckedDaysAgo !== null && sig.revLastCheckedDaysAgo > REV_STALE_DAYS) {
      const weeksAgo = Math.floor(sig.revLastCheckedDaysAgo / 7);
      flags.push({
        key: 'stale-revenue',
        summary: 'revenue data ' + weeksAgo + 'w stale',
        question: 'Revenue data last checked ' + weeksAgo + ' weeks ago \u2014 worth re-verifying given the current flow signal and whether the commercial relationship is still active.',
        readout: [['Days since last checked', Math.round(sig.revLastCheckedDaysAgo)]],
      });
    }

    // 4. Deregistration risk — bottom-10 pruning-rank zone, already computed
    // by the Screener.
    if (sig.inBottomTen) {
      flags.push({
        key: 'dereg-risk',
        summary: 'deregistration risk zone',
        question: 'Currently ranked ' + (sig.rank !== null ? sig.rank : '?') + ' in pruning order, within the bottom-10 risk zone' + (sig.isImmune ? ' (still inside registration immunity for now)' : '') + ' \u2014 confirm this is still active and check recent registration/emission trend.',
        readout: [['Rank', sig.rank !== null ? sig.rank : '\u2014'], ['Immune', sig.isImmune === true ? 'yes' : (sig.isImmune === false ? 'no' : 'unknown')]],
      });
    }

    // 5. New listing aging out — crossed back into the window where 7d
    // momentum becomes meaningful again (same 21-day boundary the Screener's
    // own momentum flag uses), but not so long ago that it's just a normal
    // established subnet now.
    if (sig.daysSinceRegistration !== null && sig.daysSinceRegistration > NEW_LISTING_AGE_OUT_MIN && sig.daysSinceRegistration <= NEW_LISTING_AGE_OUT_MAX) {
      flags.push({
        key: 'aging-out',
        summary: 'new listing aging out',
        question: 'Now ' + Math.round(sig.daysSinceRegistration) + ' days old \u2014 just crossed into the window where 7d price/momentum readings become meaningful again. Worth a fresh look now that early listing noise should be settling.',
        readout: [['Days since registration', Math.round(sig.daysSinceRegistration)]],
      });
    }

    return flags;
  }

  function addToQueue(rawNetuid) {
    const netuid = parseInt(rawNetuid, 10);
    if (!netuid || netuid < 1) {
      state.addError = 'Enter a valid subnet number.';
      render();
      return;
    }
    if (state.queue.includes(netuid)) {
      state.addError = 'SN' + netuid + ' is already in the research queue.';
      render();
      return;
    }
    state.queue.push(netuid);
    state.expanded[netuid] = true;
    state.addError = null;
    saveQueueState();
    render();
  }

  function removeFromQueue(netuid) {
    state.queue = state.queue.filter(n => n !== netuid);
    // Notes are deliberately left untouched — they live in a separate
    // storage key and persist independently of queue membership.
    saveQueueState();
    render();
  }

  function toggleExpanded(netuid) {
    state.expanded[netuid] = !state.expanded[netuid];
    render();
  }

  function toggleAnswer(netuid, flagKey) {
    state.answers[netuid] = state.answers[netuid] || {};
    state.answers[netuid][flagKey] = !state.answers[netuid][flagKey];
    saveQueueState();
    render();
  }

  function saveNote(netuid) {
    const text = (state.noteDraft[netuid] || '').trim();
    if (!text) return;
    state.notes[netuid] = state.notes[netuid] || [];
    // Append-only — never overwrites or edits prior entries. Timestamp is
    // generated here, not typed by the user.
    state.notes[netuid].push({ text: text, timestamp: Date.now() });
    state.noteDraft[netuid] = '';
    saveNotesState();
    render();
  }

  function fmtNoteTs(t) {
    const d = new Date(t);
    return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' }) + ' \u00b7 ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
  }

  function fmtUpdated(t) {
    if (!t) return 'never';
    const s = Math.floor((Date.now() - t) / 1000);
    if (s < 60) return s + 's ago';
    const m = Math.floor(s / 60);
    if (m < 60) return m + 'm ago';
    return Math.floor(m / 60) + 'h ago';
  }

  function sortedQueue() {
    return state.queue.slice().sort((a, b) => {
      const flagsA = computeFlags(state.signals && state.signals[a]).length;
      const flagsB = computeFlags(state.signals && state.signals[b]).length;
      return flagsB - flagsA; // descending
    });
  }

  function renderNotes(netuid) {
    const notes = (state.notes[netuid] || []).slice().sort((a, b) => b.timestamp - a.timestamp);
    return `
      <div class="rq-section-label">Notes</div>
      <div class="rq-notes-list">
        ${notes.length === 0 ? '<div class="rq-note">No notes yet.</div>' : notes.map(n => `
          <div class="rq-note-entry">
            <div class="rq-note-ts">${fmtNoteTs(n.timestamp)}</div>
            <div>${n.text.replace(/</g, '&lt;').replace(/\n/g, '<br/>')}</div>
          </div>
        `).join('')}
      </div>
      <div class="rq-notes-input-row">
        <textarea data-note-netuid="${netuid}" placeholder="Findings, conclusions, thesis\u2026">${(state.noteDraft[netuid] || '').replace(/</g, '&lt;')}</textarea>
        <button class="rq-btn" data-save-note-netuid="${netuid}">Save note</button>
      </div>
    `;
  }

  function renderCard(netuid) {
    const sig = state.signals ? state.signals[netuid] : null;
    const flags = computeFlags(sig);
    const isExpanded = !!state.expanded[netuid];
    const subAnswers = state.answers[netuid] || {};
    const unresolved = flags.filter(f => !subAnswers[f.key]);
    const resolved = flags.filter(f => subAnswers[f.key]);
    const summaryText = flags.length > 0 ? flags.map(f => f.summary).join(', ') : (sig ? 'no automatic flags' : 'no signal data yet');

    return `
      <div class="rq-card">
        <div class="rq-card-collapsed" data-toggle-netuid="${netuid}">
          <div class="rq-card-left">
            <span class="rq-chevron ${isExpanded ? 'open' : ''}">\u25B8</span>
            <span class="rq-sn-tag">SN${netuid}</span>
            <span class="rq-sn-name">${sig && sig.name ? sig.name : ''}</span>
            <span class="rq-card-summary">${summaryText}</span>
          </div>
          <div style="display:flex; align-items:center; gap:8px;">
            <span class="rq-flagcount">${flags.length} flag${flags.length === 1 ? '' : 's'}</span>
            <span class="rq-remove" data-remove-netuid="${netuid}" title="Remove from queue (notes will be kept once notes are added)">✕</span>
          </div>
        </div>
        ${isExpanded ? `
          <div class="rq-card-expanded">
            ${!sig ? `
              <div class="rq-note">No signal data yet for SN${netuid} \u2014 sync the Subnet screener tab at least once, then come back here.</div>
            ` : flags.length === 0 ? `
              <div class="rq-note">No automatic flags \u2014 manually added for review.</div>
            ` : `
              <div class="rq-section-label">Open questions</div>
              ${unresolved.map(f => `
                <div class="rq-question">
                  <input type="checkbox" data-answer-netuid="${netuid}" data-answer-key="${f.key}" />
                  <div class="rq-question-text">${f.question}</div>
                </div>
                <div class="rq-readout">
                  ${f.readout.map(r => `<div class="rq-readout-row"><span>${r[0]}</span><span class="mono">${r[1]}</span></div>`).join('')}
                </div>
              `).join('')}
              ${resolved.length > 0 ? `
                <div class="rq-resolved-toggle" data-toggle-resolved="${netuid}">${state.showResolved[netuid] ? 'hide' : 'show'} ${resolved.length} resolved</div>
                ${state.showResolved[netuid] ? resolved.map(f => `
                  <div class="rq-question resolved">
                    <input type="checkbox" checked data-answer-netuid="${netuid}" data-answer-key="${f.key}" />
                    <div class="rq-question-text">${f.question}</div>
                  </div>
                `).join('') : ''}
              ` : ''}
            `}
            ${renderNotes(netuid)}
          </div>
        ` : ''}
      </div>
    `;
  }

  function render() {
    const queue = sortedQueue();
    root.innerHTML = `
      <div class="rq-header">
        <div>
          <div class="rq-title">Research queue</div>
          <div class="rq-subtitle">Flagged subnets and open questions \u2014 not a score, not a verdict</div>
        </div>
        <div class="rq-updated">Signals last synced<br/><b>${fmtUpdated(state.signalsUpdatedAt)}</b></div>
      </div>

      <div class="rq-controlbar">
        <input id="rq-add-netuid" type="text" inputmode="numeric" placeholder="netuid e.g. 64" />
        <button class="rq-btn" id="rq-add-btn">Add to queue</button>
        <button class="rq-btn secondary" id="rq-refresh-signals-btn">Refresh signals</button>
        <div class="rq-note">${state.persistError ? '⚠ ' + state.persistError : (state.addError ? '⚠ ' + state.addError : (state.signals === null ? 'Loading signals…' : (Object.keys(state.signals).length === 0 ? 'No signals found yet — sync the Subnet screener tab first.' : '')))}</div>
      </div>

      ${queue.length === 0 ? `
        <div class="rq-empty">Nothing in the research queue yet.<br/>Add a subnet by netuid above, or use the flag/magnifying icon on a Subnet screener row (coming in a later step) to send it here.</div>
      ` : queue.map(netuid => renderCard(netuid)).join('')}

      <div class="rq-footnote">
        Flag count is a neutral sort aid only \u2014 never a score or a buy/avoid signal. Each flag maps to one specific question, filled in with that subnet's real numbers from the Subnet screener's most recent sync. Re-sync the Screener tab to refresh the signals this page reads from. Queue membership, checkbox state, and note history are saved in this browser via localStorage and survive reopening this file on this device \u2014 same mechanism as the watchlist and wallet address elsewhere in this dashboard. Not financial advice.
      </div>
    `;

    document.getElementById('rq-add-btn').onclick = () => {
      addToQueue(document.getElementById('rq-add-netuid').value);
    };
    document.getElementById('rq-refresh-signals-btn').onclick = () => {
      loadSignals();
      render();
    };
    root.querySelectorAll('[data-toggle-netuid]').forEach(el => {
      el.onclick = (e) => {
        if (e.target.closest('[data-remove-netuid]')) return;
        toggleExpanded(parseInt(el.getAttribute('data-toggle-netuid'), 10));
      };
    });
    root.querySelectorAll('[data-remove-netuid]').forEach(el => {
      el.onclick = (e) => { e.stopPropagation(); removeFromQueue(parseInt(el.getAttribute('data-remove-netuid'), 10)); };
    });
    root.querySelectorAll('[data-answer-netuid]').forEach(el => {
      el.onclick = (e) => e.stopPropagation();
      el.onchange = () => toggleAnswer(parseInt(el.getAttribute('data-answer-netuid'), 10), el.getAttribute('data-answer-key'));
    });
    root.querySelectorAll('[data-toggle-resolved]').forEach(el => {
      el.onclick = (e) => {
        e.stopPropagation();
        const netuid = parseInt(el.getAttribute('data-toggle-resolved'), 10);
        state.showResolved[netuid] = !state.showResolved[netuid];
        render();
      };
    });
    root.querySelectorAll('[data-note-netuid]').forEach(el => {
      el.onclick = (e) => e.stopPropagation();
      el.oninput = (e) => {
        // Deliberately no render() here — re-rendering on every keystroke
        // would reset the textarea and fight the user's typing, same issue
        // fixed earlier for the Allocation terminal's capital input.
        state.noteDraft[el.getAttribute('data-note-netuid')] = e.target.value;
      };
    });
    root.querySelectorAll('[data-save-note-netuid]').forEach(el => {
      el.onclick = (e) => {
        e.stopPropagation();
        saveNote(el.getAttribute('data-save-note-netuid'));
      };
    });
  }

  function checkPendingAdd() {
    try {
      const pending = localStorage.getItem('tao_dashboard_research_pending_add_v1');
      if (pending) {
        const netuid = parseInt(pending, 10);
        let added = false;
        if (netuid && !state.queue.includes(netuid)) {
          state.queue.push(netuid);
          added = true;
        }
        if (netuid) state.expanded[netuid] = true;
        localStorage.removeItem('tao_dashboard_research_pending_add_v1');
        if (added) saveQueueState();
        render();
        // Scroll the card into view once the DOM has updated.
        setTimeout(() => {
          const card = root.querySelector('[data-toggle-netuid="' + netuid + '"]');
          if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 50);
      }
    } catch (e) { /* non-fatal */ }
  }
  // Exposed so the tab router can trigger a pending-add check at the exact
  // moment the Research Queue tab is activated, not just on initial page load.
  window.taoCheckResearchPending = checkPendingAdd;

  loadQueueState();
  loadNotesState();
  loadSignals();
  checkPendingAdd();
  render();
})();
</script>
</div>
